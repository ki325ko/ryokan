function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(false);
  useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
    setIsMobile(mq.matches);
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [breakpoint]);
  return isMobile;
}

function FadeIn({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.15 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(32px)",
        transition: `opacity 0.8s ease ${delay}s, transform 0.8s ease ${delay}s`,
      }}
    >
      {children}
    </div>
  );
}

              background: "#2c2418", borderRadius: 2, color: "#e8dcc8",
            }}>
              <p style={{
                fontFamily: "'Shippori Mincho', serif", fontSize: 16,
                marginBottom: 8, letterSpacing: 2,
              }}>お電話でのご予約</p>
              <p style={{
                fontFamily: "'Shippori Mincho', serif", fontSize: 24, letterSpacing: 3,
                marginBottom: 8,
              }}>0776-XX-XXXX</p>
              <p style={{
                fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 11, opacity: 0.5,
              }}>受付時間 9:00〜20:00</p>
            </div>
          </FadeIn>
        </div>
      </div>
    </div>
  );
}

// ======================== MAIN APP ========================
function App() {
  const [page, setPage] = useState(PAGES.HOME);
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const contentRef = useRef(null);
  const mobile = useIsMobile();

  const navigate = (p) => {
    setPage(p);
    setMenuOpen(false);
    if (contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: "instant" });
  };

  const handleScroll = (e) => {
    setScrolled(e.target.scrollTop > 50);
  };

  const headerBg = page === PAGES.HOME && !scrolled && !menuOpen
    ? "transparent"
    : "rgba(44,36,24,0.97)";

  return (
    <div style={{ width: "100%", height: "100vh", overflow: "hidden", background: "#f7f3ee" }}>
      <style>{FONTS_CSS}{`
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f7f3ee; }
        ::-webkit-scrollbar-thumb { background: #c4a87c; border-radius: 3px; }
      `}</style>

      {/* Header */}
      <header style={{
        position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
        background: headerBg,
        backdropFilter: "blur(12px)",
        transition: "background 0.4s ease",
        borderBottom: scrolled || page !== PAGES.HOME || menuOpen ? "1px solid rgba(196,168,124,0.15)" : "none",
      }}>
        <div style={{
          maxWidth: 1200, margin: "0 auto", padding: "0 20px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          height: 60,
        }}>
          <div
            onClick={() => navigate(PAGES.HOME)}
            style={{ cursor: "pointer", display: "flex", alignItems: "baseline", gap: 8 }}
          >
            <span style={{
              fontFamily: "'Shippori Mincho', serif", fontSize: mobile ? 20 : 22,
              color: "#fff", letterSpacing: 4,
            }}>湯雲閣</span>
            {!mobile && (
              <span style={{
                fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 9,
                color: "rgba(255,255,255,0.4)", letterSpacing: 2,
              }}>YUUNKAKU</span>
            )}
          </div>

          {/* Desktop nav */}
          {!mobile && (
            <nav style={{ display: "flex", gap: 4, alignItems: "center" }}>
              {NAV_ITEMS.filter(n => n.id !== PAGES.HOME).map(item => (
                <button
                  key={item.id}
                  onClick={() => navigate(item.id)}
                  style={{
                    background: "none", border: "none", cursor: "pointer",
                    padding: "8px 12px",
                    fontFamily: "'Zen Kaku Gothic New', sans-serif",
                    fontSize: 11, letterSpacing: 2,
                    color: page === item.id ? "#c4a87c" : "rgba(255,255,255,0.7)",
                    transition: "color 0.3s ease",
                  }}
                >{item.label}</button>
              ))}
            </nav>
          )}

          {/* Hamburger button */}
          {mobile && (
            <button
              onClick={() => setMenuOpen(!menuOpen)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                padding: 8, display: "flex", flexDirection: "column",
                gap: menuOpen ? 0 : 5, alignItems: "center", justifyContent: "center",
                width: 36, height: 36, position: "relative",
              }}
            >
              <span style={{
                display: "block", width: 20, height: 1.5, background: "#fff", borderRadius: 1,
                transition: "all 0.3s ease",
                transform: menuOpen ? "rotate(45deg) translateY(0)" : "none",
                position: menuOpen ? "absolute" : "relative",
              }} />
              {!menuOpen && <span style={{
                display: "block", width: 20, height: 1.5, background: "#fff", borderRadius: 1,
              }} />}
              <span style={{
                display: "block", width: 20, height: 1.5, background: "#fff", borderRadius: 1,
                transition: "all 0.3s ease",
                transform: menuOpen ? "rotate(-45deg) translateY(0)" : "none",
                position: menuOpen ? "absolute" : "relative",
              }} />
            </button>
          )}
        </div>

        {/* Mobile menu */}
        {mobile && (
          <div style={{
            maxHeight: menuOpen ? 420 : 0, overflow: "hidden",
            transition: "max-height 0.4s ease",
            background: "rgba(44,36,24,0.97)",
          }}>
            <div style={{ padding: "8px 20px 24px", display: "flex", flexDirection: "column", gap: 2 }}>
              {NAV_ITEMS.map(item => (
                <button
                  key={item.id}
                  onClick={() => navigate(item.id)}
                  style={{
                    background: page === item.id ? "rgba(196,168,124,0.1)" : "none",
                    border: "none", cursor: "pointer", textAlign: "left",
                    padding: "14px 12px", borderRadius: 4,
                    fontFamily: "'Noto Serif JP', serif", fontSize: 14, letterSpacing: 2,
                    color: page === item.id ? "#c4a87c" : "rgba(255,255,255,0.7)",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                  }}
                >
                  <span>{item.label}</span>
                  <span style={{
                    fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 9,
                    opacity: 0.4, letterSpacing: 1,
                  }}>{item.labelEn}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </header>

      {/* Content */}
      <div
        ref={contentRef}
        onScroll={handleScroll}
        style={{ height: "100vh", overflowY: "auto", overflowX: "hidden" }}
      >
        {page === PAGES.HOME && <HomePage navigate={navigate} />}
        {page === PAGES.ROOMS && <RoomsPage />}
        {page === PAGES.ONSEN && <OnsenPage />}
        {page === PAGES.CUISINE && <CuisinePage />}
        {page === PAGES.PLANS && <PlansPage />}
        {page === PAGES.ACCESS && <AccessPage />}
        {page === PAGES.FAQ && <FAQPage />}
        {page === PAGES.RESERVE && <ReservePage />}

        {/* Footer */}
        <footer style={{
          background: "#1a1610", padding: "60px 20px 32px", color: "#e8dcc8",
        }}>
          <div style={{
            maxWidth: 900, margin: "0 auto",
            display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))",
            gap: 40, marginBottom: 40,
          }}>
            <div>
              <h3 style={{
                fontFamily: "'Shippori Mincho', serif", fontSize: 22,
                letterSpacing: 4, marginBottom: 12,
              }}>湯雲閣</h3>
              <p style={{
                fontFamily: "'Noto Serif JP', serif", fontSize: 12,
                lineHeight: 2.2, opacity: 0.5,
              }}>
                〒910-4XXX<br />
                福井県あわら市温泉X丁目X-X<br />
                TEL: 0776-XX-XXXX
              </p>
            </div>
            <div>
              <p style={{
                fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 10,
                letterSpacing: 3, opacity: 0.4, marginBottom: 16,
              }}>PAGES</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {NAV_ITEMS.map(item => (
                  <button
                    key={item.id}
                    onClick={() => navigate(item.id)}
                    style={{
                      background: "none", border: "none", cursor: "pointer",
                      textAlign: "left", padding: 0,
                      fontFamily: "'Noto Serif JP', serif", fontSize: 13,
                      color: "rgba(232,220,200,0.5)",
                      transition: "color 0.3s ease",
                    }}
                    onMouseEnter={e => e.target.style.color = "#c4a87c"}
                    onMouseLeave={e => e.target.style.color = "rgba(232,220,200,0.5)"}
                  >{item.label}</button>
                ))}
              </div>
            </div>
            <div>
              <p style={{
                fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 10,
                letterSpacing: 3, opacity: 0.4, marginBottom: 16,
              }}>INFORMATION</p>
              <p style={{
                fontFamily: "'Noto Serif JP', serif", fontSize: 12,
                lineHeight: 2.4, opacity: 0.5,
              }}>
                チェックイン 15:00〜18:00<br />
                チェックアウト 〜10:00<br />
                駐車場 30台（無料）<br />
                全館Wi-Fi完備
              </p>
            </div>
          </div>
          <div style={{
            borderTop: "1px solid rgba(196,168,124,0.1)",
            paddingTop: 24, textAlign: "center",
          }}>
            <p style={{
              fontFamily: "'Zen Kaku Gothic New', sans-serif",
              fontSize: 10, letterSpacing: 2, opacity: 0.3,
            }}>© 2024 湯雲閣 YUUNKAKU. All Rights Reserved. ※このサイトは架空の旅館のデモサイトです。</p>
          </div>
        </footer>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
